services:
  postgres:
    image: postgres:17-alpine
    container_name: transaction-risk-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transactionrisk}
      POSTGRES_USER: ${POSTGRES_USER:-transactionrisk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-transactionrisk} -d ${POSTGRES_DB:-transactionrisk}
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: transaction-risk-api
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: postgres

      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-transactionrisk}
      DB_USERNAME: ${POSTGRES_USER:-transactionrisk}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-transaction-risk-api}
      JWT_TTL: ${JWT_TTL:-PT1H}

      DEMO_USERNAME: ${DEMO_USERNAME:-demo}
      DEMO_PASSWORD: ${DEMO_PASSWORD:?Set DEMO_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
