spring:
  application:
    name: transaction-risk-api

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

      properties:
        enable.idempotence: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "1"
    baseline-description: Existing schema
    validate-on-migrate: true
  datasource:
    url: jdbc:h2:mem:transactionrisk
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

security:
  jwt:
    issuer: ${JWT_ISSUER:transaction-risk-api}
    secret: ${JWT_SECRET}
    ttl: ${JWT_TTL:PT1H}

  demo-user:
    username: ${DEMO_USERNAME}
    password: ${DEMO_PASSWORD}

app:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topic: ${KAFKA_TOPIC:transaction-created.v1}
    publisher-delay-ms: ${KAFKA_PUBLISHER_DELAY_MS:5000}
    maximum-attempts: ${KAFKA_MAXIMUM_ATTEMPTS:5}
    send-timeout: ${KAFKA_SEND_TIMEOUT:PT10S}
    stale-processing-timeout: ${KAFKA_STALE_PROCESSING_TIMEOUT:PT5M}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
