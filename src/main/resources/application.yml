spring:
  application:
    name: transaction-risk-api

  datasource:
    url: jdbc:h2:mem:transactionrisk
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

security:
  jwt:
    issuer: ${JWT_ISSUER:transaction-risk-api}
    secret: ${JWT_SECRET}
    ttl: ${JWT_TTL:PT1H}

  demo-user:
    username: ${DEMO_USERNAME}
    password: ${DEMO_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
